name: Keep-alive Railway Backend

on:
  schedule:
    # Ping every 10 minutes (GitHub Actions minimum is 5 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AgroPrix API health endpoint
        run: |
          echo "Pinging AgroPrix Railway backend..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://web-production-46fb2.up.railway.app/api/health)
          echo "HTTP response: $response"
          if [ "$response" = "200" ] || [ "$response" = "207" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $response — Railway may be starting up (cold start ~30s)"
          fi
